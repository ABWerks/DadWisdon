name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages (source = GitHub Actions) via API on first run,
          # so no manual toggle in repo settings is required.
          enablement: true
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # Serve the repo root — the app is plain static files.
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
